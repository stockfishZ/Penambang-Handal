<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoNiRisk - Edit Data</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="geo_styles.css">
</head>
<body class="bg-[#F8F9FA] font-sans text-gray-800 min-h-screen flex flex-col">

    <div class="max-w-7xl mx-auto px-4 pt-6 w-full">
        <header class="bg-theme-dark text-white rounded-2xl py-4 px-8 flex justify-between items-center shadow-md">
            <div class="flex items-center space-x-3">
                <img src="../asset-image/logo.png" alt="GeoNiRisk Logo" class="w-10 h-10 object-contain">
                <h1 class="text-2xl font-bold tracking-wide font-custom-geo text-white">GeoNiRisk - Edit Mode</h1>
            </div>
            <a href="index.html" class="flex items-center space-x-2 bg-gray-600 hover:bg-gray-500 text-white px-5 py-2 rounded-lg font-bold transition-colors">
                <span>← Back to Dashboard</span>
            </a>
        </header>
    </div>

    <main class="max-w-7xl mx-auto px-4 py-8 w-full flex-grow">
        <form id="dataEditForm" class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-6 space-y-6">
                <div class="bg-card-light rounded-2xl p-6 shadow-sm border border-gray-300">
                    <h3 class="text-xl font-bold text-gray-900 mb-4 border-b border-gray-400 pb-2">General Information</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="col-span-2">
                            <label class="block text-sm font-semibold mb-1">Nama Titik Bor</label>
                            <input type="text" id="titik-name" class="w-full rounded-md border-gray-400 shadow-sm p-2 bg-gray-100 font-bold" readonly>
                            <p class="text-[10px] text-gray-500 mt-1">ID cannot be changed in edit mode.</p>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-1">Latitude</label>
                            <input type="number" step="0.000001" min="-90" max="90" id="lat" class="w-full rounded-md border-gray-400 shadow-sm p-2" required>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-1">Longitude</label>
                            <input type="number" step="0.000001" min="-180" max="180" id="lon" class="w-full rounded-md border-gray-400 shadow-sm p-2" required>
                        </div>
                    </div>
                </div>

                <div class="bg-card-light rounded-2xl p-6 shadow-sm border border-gray-300">
                    <h3 class="text-xl font-bold text-gray-900 mb-4 border-b border-gray-400 pb-2">Geological Parameters</h3>
                    
                    <div class="grid grid-cols-3 gap-4 mb-4">
                        <div>
                            <label class="block text-xs font-semibold mb-1">Iron Index (0-5)</label>
                            <input type="number" min="0" max="5" id="idx-iron" class="w-full rounded-md p-2" required>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold mb-1">Clay Index (0-5)</label>
                            <input type="number" min="0" max="5" id="idx-clay" class="w-full rounded-md p-2" required>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold mb-1">Veg Index (0-5)</label>
                            <input type="number" min="0" max="5" id="idx-veg" class="w-full rounded-md p-2" required>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-xs font-semibold mb-1">AI Conf. Min (%)</label>
                            <input type="number" min="0" max="100" id="ai-min" class="w-full rounded-md p-2" required>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold mb-1">AI Conf. Max (%)</label>
                            <input type="number" min="0" max="100" id="ai-max" class="w-full rounded-md p-2" required>
                        </div>
                        <p id="err-ai" class="col-span-2 text-red-600 text-xs font-bold hidden">Error: Min cannot exceed Max.</p>
                    </div>

                    <h4 class="text-sm font-bold mt-4 mb-2 flex justify-between">
                        <span>Lithology Distribution</span>
                        <span id="litho-sum-display" class="text-red-600">Sum: 0%</span>
                    </h4>
                    <div class="grid grid-cols-4 gap-2">
                        <div><label class="text-[10px] font-bold">Laterite %</label><input type="number" min="0" max="100" id="litho-1" class="litho-input w-full p-1 rounded border"></div>
                        <div><label class="text-[10px] font-bold">Saprolite %</label><input type="number" min="0" max="100" id="litho-2" class="litho-input w-full p-1 rounded border"></div>
                        <div><label class="text-[10px] font-bold">Saprock %</label><input type="number" min="0" max="100" id="litho-3" class="litho-input w-full p-1 rounded border"></div>
                        <div><label class="text-[10px] font-bold">Bedrock %</label><input type="number" min="0" max="100" id="litho-4" class="litho-input w-full p-1 rounded border"></div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-6 space-y-6 flex flex-col">
                
                <div class="bg-card-light rounded-2xl p-6 shadow-sm border border-gray-300">
                    <h3 class="text-xl font-bold text-gray-900 mb-4 border-b border-gray-400 pb-2">ESG & K3</h3>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-xs font-semibold mb-1">Dist. to Water (km)</label>
                            <input type="number" min="0" step="0.1" id="dist-water" class="w-full rounded-md p-2" required>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold mb-1">Dist. to Settlement (km)</label>
                            <input type="number" min="0" step="0.1" id="dist-settlement" class="w-full rounded-md p-2" required>
                        </div>
                    </div>
                    
                    <h4 class="text-sm font-bold mt-4 mb-2 flex justify-between">
                        <span>Land Use Category</span>
                        <span id="land-sum-display" class="text-red-600">Sum: 0%</span>
                    </h4>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="flex items-center space-x-2"><input type="number" min="0" max="100" id="land-1" class="land-input w-16 p-1 rounded border"><label class="text-[10px] font-bold">Hutan Lindung</label></div>
                        <div class="flex items-center space-x-2"><input type="number" min="0" max="100" id="land-2" class="land-input w-16 p-1 rounded border"><label class="text-[10px] font-bold">Hutan Produksi Tetap</label></div>
                        <div class="flex items-center space-x-2"><input type="number" min="0" max="100" id="land-3" class="land-input w-16 p-1 rounded border"><label class="text-[10px] font-bold">Area Penggunaan Lain</label></div>
                        <div class="flex items-center space-x-2"><input type="number" min="0" max="100" id="land-4" class="land-input w-16 p-1 rounded border"><label class="text-[10px] font-bold">Kawasan Konservasi</label></div>
                    </div>
                </div>

                <div class="bg-card-light rounded-2xl p-6 shadow-sm border border-gray-300">
                    <h3 class="text-xl font-bold text-gray-900 mb-4 border-b border-gray-400 pb-2">Operational Logistics</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold mb-1">Dist. to Road (km)</label>
                            <input type="number" min="0" step="0.1" id="ops-road" class="w-full rounded-md p-2" required>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold mb-1">Dist. to River (km)</label>
                            <input type="number" min="0" step="0.1" id="ops-river" class="w-full rounded-md p-2" required>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold mb-1">Dist. to BTS (km)</label>
                            <input type="number" min="0" step="0.1" id="ops-bts" class="w-full rounded-md p-2" required>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold mb-1">Cut & Fill Vol (m³)</label>
                            <input type="number" min="0" id="ops-cutfill" class="w-full rounded-md p-2" required>
                        </div>
                    </div>
                </div>

                <div class="panel-gradient flex-grow flex flex-col justify-center items-center rounded-2xl p-6 mt-auto">
                    <div id="status-message" class="text-yellow-300 font-bold mb-4 text-center text-sm">
                        Fetching current data...
                    </div>
                    <button type="submit" id="update-btn" disabled class="bg-gray-500 text-white font-bold py-3 px-12 rounded-lg cursor-not-allowed transition-all duration-300">
                        UPDATE DATA
                    </button>
                </div>
            </div>
        </form>
    </main>

    <script src="edit_script.js"></script>
</body>
</html>
